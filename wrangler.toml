name = "cloudflare-ai"
main = "index.js"
compatibility_date = "2024-03-01"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "SUBTITLE_KV"
id = "d2b887baaf9f4ddbad85f814fe5e836f"


[[queues.producers]]
queue = "subtitle-queue"
binding = "SUBTITLE_QUEUE"

[[queues.consumers]]
queue = "subtitle-queue"
max_batch_size = 1
max_batch_timeout = 30

[[d1_databases]]
binding = "SUBTITLE_DB"
database_name = "subtitle_db"
database_id = "8efe110e-b2cc-4758-9e8c-45841be4dc0f" # 사용자가 생성 후 ID를 입력해야 함
